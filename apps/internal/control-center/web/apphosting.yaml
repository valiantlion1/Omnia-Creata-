runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2
  concurrency: 20

env:
  - variable: NEXT_PUBLIC_APP_URL
    value: https://ops.omniacreata.com
  - variable: NEXT_PUBLIC_OCOS_HOSTNAME
    value: ops.omniacreata.com
  - variable: NEXT_PUBLIC_ENABLE_DEMO_DATA
    value: "false"
  - variable: OCOS_TRUST_CLOUDFLARE_ACCESS
    value: "true"
  - variable: OCOS_STUDIO_PROD_BASE_URL
    value: https://studio.omniacreata.com
  - variable: OCOS_STUDIO_STAGING_BASE_URL
    value: https://staging-studio.omniacreata.com

# Configure the remaining values as Firebase App Hosting secrets:
# - NEXT_PUBLIC_SUPABASE_URL
# - SUPABASE_SERVICE_ROLE_KEY
# - OCOS_INTERNAL_API_TOKEN
# - OCOS_TELEGRAM_BOT_TOKEN
# - OCOS_TELEGRAM_CHAT_ID
# - OCOS_GITHUB_TOKEN
# - OCOS_GITHUB_REPO
# - OCOS_GITHUB_WORKFLOW_ID
