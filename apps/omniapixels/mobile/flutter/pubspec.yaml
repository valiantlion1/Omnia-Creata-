name: omniapixels
description: "OmniaPixels, a local-first mobile photo editor and upscaler by Omnia Creata."
publish_to: 'none'

version: 0.3.13+21

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  crop_your_image: ^2.0.0
  image: ^4.8.0
  image_picker: ^1.2.1
  package_info_plus: ^10.1.0
  path_provider: ^2.1.5
  photo_manager: ^3.9.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/brand/
