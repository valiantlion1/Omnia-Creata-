name: omniapixels_flutter
description: OmniaPixels Flutter mobile app - AI-powered image processing

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase & Auth
  supabase_flutter: ^2.3.0
  google_sign_in: ^6.2.1

  # Network
  dio: ^5.3.2

  # Image & Gallery
  photo_manager: ^3.0.0
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  flutter_image_compress: ^2.1.0

  # UI & Sharing
  share_plus: ^7.2.1

  # State management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # Utils
  path: ^1.8.3
  path_provider: ^2.1.1
  uuid: ^4.1.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
