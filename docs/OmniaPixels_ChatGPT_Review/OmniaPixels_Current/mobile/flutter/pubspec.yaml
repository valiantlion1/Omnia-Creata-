name: omniapixels_flutter
description: OmniaPixels Flutter mobile app - AI-powered image processing

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.8
  
  # Network
  dio: ^5.3.2
  dio_retry: ^4.0.0
  
  # Image & File handling
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  
  # UI & Sharing
  share_plus: ^7.2.1
  
  # State management
  provider: ^6.1.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Utils
  path: ^1.8.3
  uuid: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
